version: '3.7'

services:


  chargen:
    build:
      context: .
      dockerfile: ./src/Dockerfile
    container_name: chargen
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      chardb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/misk/helth"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  chardb:
    container_name: chardb
    image: postgres:latest
    volumes:
      - chars_data:/var/lib/postgesql/data
    environment:
      - POSTGRES_DB=chars
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - 55432:5432

    # restart: unless-stoped
    # logging:

  test_db:
    container_name: test_db
    image: postgres:latest
    environment:
      - POSTGRES_DB=chars
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - 55433:5432

    # restart: unless-stoped
    # logging:


  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
      target: worker
    environment:
      - AI_API_KEY=${AI_API_KEY}
      - REDIS_URL="redis://redis:6379/0"
    volumes:
      - ./src:/app/
      - ./worker/celery_app.py:/app/celery_app.py
      - ./worker/ai_task:/app/ai_task
    depends_on:
      - redis
  celery-flower:
    build:
      context: ./worker
      dockerfile: Dockerfile
      target: flower
    environment:
      # - AI_API_KEY=${AI_API_KEY}
      - REDIS_URL="redis://redis:6379/0"
    volumes:
      - ./src:/app/
      - ./worker/celery_app.py:/app/celery_app.py
      - ./worker/ai_task:/app/ai_task
    depends_on:
      - redis
      - celery-worker
    ports:
      - 5555:5555

  nginx:
    image: nginx:1.21.0-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/proxi_params:/etc/nginx/proxy_params
    ports:
      - 80:80
  

volumes:
  chars_data:
    name: chars_data



    
